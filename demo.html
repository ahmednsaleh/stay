<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Stay — demo</title>
  <meta name="viewport" content="width=1280" />
  <style>
    /* Demo surface: a quiet, ChatGPT-shaped page so the same content.js
       can attach without the real chatgpt.com auth. */
    /* Claude.ai-style palette: warm cream, soft peach accents, ample spacing. */
    :root {
      --bg: #faf9f5;
      --bg-side: #f0eee6;
      --fg: #2a2a2a;
      --fg-soft: #6f6f6f;
      --border: rgba(60, 40, 20, 0.10);
      --user-bg: #ece8de;
      --claude-orange: #c96342;
      --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif;
      --serif: "Tiempos Text", Georgia, "Times New Roman", serif;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#262624; --bg-side:#1a1a18; --fg:#ebebe9; --fg-soft:#a8a8a8; --border:rgba(255,255,255,.10); --user-bg:#33312e; }
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.55;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: 100vh;
    }
    .side {
      background: var(--bg-side);
      border-right: 1px solid var(--border);
      padding: 14px;
      font-size: 13px;
      color: var(--fg-soft);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .side-h {
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--fg-soft);
      margin: 8px 0 6px;
    }
    .side-item {
      padding: 7px 10px;
      border-radius: 8px;
    }
    .side-item.active {
      background: var(--user-bg);
      color: var(--fg);
    }
    .main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .topbar {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--fg-soft);
    }
    .conv {
      flex: 1;
      overflow-y: auto;
      padding: 24px 18px 100px;
    }
    .conv-inner {
      max-width: 760px;
      margin: 0 auto;
    }

    .msg {
      margin: 24px 0;
      padding: 0;
    }
    [data-message-author-role="user"] .bubble {
      background: var(--user-bg);
      padding: 12px 16px;
      border-radius: 18px;
      max-width: 80%;
      margin-left: auto;
    }
    [data-message-author-role="assistant"] {
      padding: 4px 0;
    }
    [data-message-author-role="assistant"] .bubble {
      padding: 0;
    }

    .composer-wrap {
      border-top: 1px solid var(--border);
      padding: 16px 18px 22px;
      background: var(--bg);
    }
    .composer {
      max-width: 760px;
      margin: 0 auto;
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 14px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      box-shadow: 0 0 0 0 rgba(0,0,0,0);
      transition: box-shadow 200ms ease;
    }
    .composer:focus-within {
      box-shadow: 0 0 0 2px rgba(201,99,66,0.18);
    }
    .composer textarea {
      flex: 1;
      border: 0;
      outline: 0;
      resize: none;
      font: inherit;
      font-size: 15px;
      line-height: 1.45;
      color: var(--fg);
      background: transparent;
      max-height: 200px;
      min-height: 22px;
      padding: 4px 0;
    }
    .composer button[data-testid="send-button"] {
      background: var(--claude-orange);
      color: #fff;
      border: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .composer button[data-testid="send-button"]:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* fake "typing" cursor for demo realism */
    .typing-cursor {
      display: inline-block;
      width: 8px;
      height: 16px;
      background: currentColor;
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 800ms infinite;
    }
    @keyframes blink {
      0%, 50% { opacity: 1; }
      50.01%, 100% { opacity: 0; }
    }

    .demo-banner {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(201,99,66,0.12);
      color: var(--claude-orange);
      border: 1px solid rgba(201,99,66,0.3);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.04em;
      z-index: 100;
    }
  </style>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="demo-banner">DEMO — same UI Stay attaches to on Claude.ai</div>

  <div class="layout">
    <aside class="side">
      <div class="side-h">Today</div>
      <div class="side-item active">New chat</div>
      <div class="side-item">Pricing model questions</div>
      <div class="side-item">Onboarding flow review</div>
      <div class="side-h" style="margin-top:14px;">Yesterday</div>
      <div class="side-item">Q4 hiring plan</div>
      <div class="side-item">Stripe webhook debugging</div>
    </aside>

    <main class="main">
      <div class="topbar">Claude · Sonnet 4.6 · demo surface</div>

      <div class="conv">
        <div class="conv-inner" id="conv"></div>
      </div>

      <div class="composer-wrap">
        <div class="composer">
          <textarea id="prompt-textarea" placeholder="Reply to Claude..." rows="1"></textarea>
          <button data-testid="send-button" id="send" disabled aria-label="Send">↑</button>
        </div>
      </div>
    </main>
  </div>

  <script src="content.js"></script>
  <script>
    /* Demo controller — gives the page just enough behavior so the same
       content.js sees the same DOM patterns as real ChatGPT. */
    (() => {
      const conv = document.getElementById('conv');
      const ta = document.getElementById('prompt-textarea');
      const send = document.getElementById('send');

      ta.addEventListener('input', () => {
        send.disabled = !ta.value.trim();
        ta.style.height = 'auto';
        ta.style.height = Math.min(200, ta.scrollHeight) + 'px';
      });

      const SAMPLE_RESPONSE = `Pricing pivots that lift conversion materially usually do one of three things:

1. **Reduce decision friction.** Fewer plans, clearer value per tier. Most pre-PMF SaaS over-tiers — three plans is plenty, often two is better.

2. **Anchor on outcome, not feature count.** "$X/month for the result you want" beats "$X for these 12 features."

3. **Move from per-seat to usage-based** (or vice versa, depending on what your users actually consume vs share).

The risk: changing pricing too early can make existing users churn out of confusion. Test the new pricing on cohorts behind a flag before flipping the public page. Track conversion *and* 30-day retention together — a pricing change that lifts conversion 20% but cuts retention 30% is a regression.`;

      function appendUser(text) {
        const node = document.createElement('div');
        node.className = 'msg';
        node.setAttribute('data-message-author-role', 'user');
        node.innerHTML = `<div class="bubble"></div>`;
        node.querySelector('.bubble').textContent = text;
        conv.appendChild(node);
        node.scrollIntoView({ behavior: 'smooth', block: 'end' });
      }

      function appendAssistant(text) {
        const node = document.createElement('div');
        node.className = 'msg';
        node.setAttribute('data-message-author-role', 'assistant');
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        node.appendChild(bubble);
        conv.appendChild(node);
        // simulate quick response (real streaming not needed for demo)
        bubble.innerHTML = text.replace(/\n/g, '<br/>');
        return node;
      }

      function trySend() {
        const text = ta.value.trim();
        if (!text) return;
        appendUser(text);
        ta.value = '';
        send.disabled = true;
        // Slight delay so MutationObserver in content.js definitely fires
        setTimeout(() => appendAssistant(SAMPLE_RESPONSE), 400);
      }

      send.addEventListener('click', trySend);
      ta.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          trySend();
        }
      });

      // Expose for autoplay driver
      window.__stayDemo = {
        type: async (text, ms = 30) => {
          ta.focus();
          ta.value = '';
          ta.dispatchEvent(new Event('input'));
          for (const ch of text) {
            ta.value += ch;
            ta.dispatchEvent(new Event('input'));
            await new Promise((r) => setTimeout(r, ms));
          }
        },
        send: () => trySend(),
        clickReveal: () => document.querySelector('.stay-btn-primary')?.click(),
        clickCal: (which = 'surprised') =>
          document.querySelector(`.stay-cal-btn[data-cal="${which}"]`)?.click(),
        typeInPredict: async (text, ms = 35) => {
          const input = document.querySelector('.stay-input');
          if (!input) return;
          input.focus();
          input.value = '';
          for (const ch of text) {
            input.value += ch;
            input.dispatchEvent(new Event('input'));
            await new Promise((r) => setTimeout(r, ms));
          }
        },
      };
    })();
  </script>
</body>
</html>
